set -ag terminal-features ",*:RGB"

set -g set-titles on
set -g set-titles-string "#{pane_current_command}###P (#H)"
 
set -g pane-border-indicators colour
set -g pane-border-lines heavy
 
unbind C-b
set-option -g prefix C-a
set-window-option -g mode-keys vi
bind-key C-\\ send-prefix

bind r source-file ~/.tmux.conf \; display "Config reloaded"
bind d detach-client \; run "printf '\033]0;#H\007' >#{client_tty}"

unbind '"'
unbind %
bind | split-window -h
bind - split-window -v

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

unbind-key C-s

unbind-key -T copy-mode-vi C-f
unbind-key -T copy-mode-vi C-d
bind-key -T copy-mode-vi y send-keys -X copy-selection
bind-key -T copy-mode-vi C-u send-keys -X page-up
bind-key -T copy-mode-vi C-b send-keys -X page-down
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

set -g @plugin 'nordtheme/tmux'

run '~/.tmux/plugins/tpm/tpm'
